<!--
  Legado Linux 应用图标 - 打开的书 (墨绿主题)
  创建日期: 2026-06-16
  说明: 用于 deb/rpm/AppImage 打包的源图标; 构建时由 Makefile 转换为 512x512 PNG
  修改历史:
