# Legado Linux 后端 - Ktor 配置文件
# 创建日期: 2026-06-13
# 说明：端口、主机、模块等服务器配置

ktor {
    deployment {
        # HTTP 服务端口，与 Android 版 WebService 默认端口一致
        port = 1122
        port = ${?PORT}
        # 监听地址（0.0.0.0 = 所有网卡）
        host = 0.0.0.0
        host = ${?HOST}
        # Netty 工作线程数
        shutdownGracePeriod = 5000
        shutdownTimeout = 10000
    }
    application {
        # 引用 Application.module() 函数
        modules = [ io.legado.ApplicationKt.module ]
    }
}