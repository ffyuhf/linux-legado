name: build

on:
  workflow_dispatch:
    inputs:
      package_format:
        description: Package format
        required: true
        default: all
        type: choice
        options: [all, deb, rpm, appimage, jar-only]
      run_tests:
        description: Run backend tests before build
        required: false
        default: true
        type: boolean

concurrency:
  group: build-${{ github.event.inputs.package_format || 'all' }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install packaging toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin dpkg-dev rpm

      - name: Install appimagetool
        run: |
          # appimagetool 本身是 AppImage, 启动时需 dlopen libfuse.so.2;
          # ubuntu-22.04 runner 默认未预装 libfuse2, 缺失会让打包报
          # "dlopen(): error loading libfuse.so.2" 而失败。
          sudo apt-get install -y libfuse2
          sudo install -d /usr/local/bin
          sudo curl -fsSL -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
          # fail-fast: 确认 appimagetool 能加载 libfuse 正常运行,
          # 否则错误会推迟到打包阶段才以隐晦的 dlopen 形式暴露
          appimagetool --version

      - name: Install frontend deps
        # 项目统一使用 npm（package-lock.json），CI 用 npm ci 复用锁文件；
        # 后续 make build 也走 npm run build，全程无需 pnpm。
        run: npm ci
        working-directory: frontend

      - name: Backend tests
        if: github.event.inputs.run_tests == 'true'
        run: make backend-test

      - name: Build
        run: make build

      - name: Package deb
        if: github.event.inputs.package_format != 'jar-only' && github.event.inputs.package_format != 'rpm' && github.event.inputs.package_format != 'appimage'
        run: make package-deb

      - name: Package rpm
        if: github.event.inputs.package_format != 'jar-only' && github.event.inputs.package_format != 'deb' && github.event.inputs.package_format != 'appimage'
        run: make package-rpm

      - name: Package AppImage
        if: github.event.inputs.package_format != 'jar-only' && github.event.inputs.package_format != 'deb' && github.event.inputs.package_format != 'rpm'
        run: make package-appimage

      - name: Collect artifacts
        run: |
          install -d artifacts
          cp backend/build/libs/legado-linux-1.0.0-all.jar artifacts/ 2>/dev/null || true
          cp packaging/dist/*.deb artifacts/ 2>/dev/null || true
          cp packaging/dist/*.rpm artifacts/ 2>/dev/null || true
          cp packaging/dist/*.AppImage artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: legado-linux-${{ github.event.inputs.package_format || 'all' }}-${{ github.run_number }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30
